apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamingapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/streaming
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.streaming.name }}
            port:
              number: {{ .Values.services.streaming.port }}
      - path: /api/admin
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.admin.name }}
            port:
              number: {{ .Values.services.admin.port }}
      - path: /api/chat
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.chat.name }}
            port:
              number: {{ .Values.services.chat.port }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.name }}
            port:
              number: {{ .Values.frontend.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamingapp-auth-ingress
  annotations:
    ingressClassName: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service-service
            port:
              number: 3001
