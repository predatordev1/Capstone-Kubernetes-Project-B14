apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamingapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Required for Socket.IO WebSocket upgrade handshake
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.auth.name }}
            port:
              number: {{ .Values.services.auth.port }}

      - path: /api/streaming
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.streaming.name }}
            port:
              number: {{ .Values.services.streaming.port }}

      - path: /api/admin
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.admin.name }}
            port:
              number: {{ .Values.services.admin.port }}

      - path: /api/chat
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.chat.name }}
            port:
              number: {{ .Values.services.chat.port }}

      # Socket.IO WebSocket connections — must appear before / catch-all
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.chat.name }}
            port:
              number: {{ .Values.services.chat.port }}

      # Catch-all: all non-API requests go to the React SPA
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.name }}
            port:
              number: {{ .Values.frontend.port }}
