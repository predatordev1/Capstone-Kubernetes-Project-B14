apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: streamingapp-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: streamingapp.pods
    interval: 30s
    rules:
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="default"}[5m]) * 300 > 1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"

    - alert: PodOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled",namespace="default"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} was OOMKilled"

    - alert: PodPendingTooLong
      expr: kube_pod_status_phase{phase="Pending",namespace="default"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} stuck Pending for 5 minutes"

  - name: streamingapp.nodes
    rules:
    - alert: NodeHighCPU
      expr: (1 - avg by(node)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} CPU above 80%"

    - alert: NodeHighMemory
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.node }} memory above 85%"
