global:
  awsRegion: us-west-1
  awsAccountId: "975050024946"
  ecrRegistry: 975050024946.dkr.ecr.us-west-1.amazonaws.com

replicaCount: 2

image:
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ecr-secret

services:
  auth:
    name: auth-service
    image: streamingapp-auth-pp
    port: 3001
  streaming:
    name: streaming-service
    image: streamingapp-streaming-pp
    port: 3002
  admin:
    name: admin-service
    image: streamingapp-admin-pp
    port: 3003
  chat:
    name: chat-service
    image: streamingapp-chat-pp
    port: 3004

frontend:
  name: frontend
  image: streamingapp-frontend-pp
  port: 80
  serviceType: ClusterIP

healingController:
  name: healing-controller
  image: streamingapp-healing-controller-pp
  restartThreshold: "3"
  cooldownSeconds: "300"

aws:
  s3Bucket: "streamingapp-videos-975050024946"

# CORS allowed origin — must match the public-facing URL that browsers use
# This is the nginx ingress ELB URL (set after nginx ingress controller is installed)
clientUrls: "http://k8s-ingressn-ingressn-553d92ca08-bd3b405987d606fd.elb.us-west-1.amazonaws.com"

# Public URL for the streaming service — used to build thumbnail and video stream
# URLs returned to the browser. Must be the external nginx URL, not internal k8s DNS.
streamingPublicUrl: "http://k8s-ingressn-ingressn-553d92ca08-bd3b405987d606fd.elb.us-west-1.amazonaws.com"

# Set to true only for local single-node development; Atlas is used in production
database:
  enabled: false
  replicas: 1

# Set ingressEnabled: true after running the Grafana sub-path Helm upgrade
# described in the README. Grafana must be configured with serve_from_sub_path=true
# before enabling this, or redirects will break.
grafana:
  ingressEnabled: false
